# Agent Mesh 配置文件

server:
  host: 127.0.0.1
  port: 18800
  max_connections: 100
  heartbeat_interval: 30
  heartbeat_timeout: 90

database:
  path: ./data/agent_mesh.db

discovery:
  auto_discover: true
  scan_paths:
    - ~/.openclaw/agents/
    - ~/.hermes/
    - ~/.codex/
  confirm_required: true

adapters:
  hermes:
    enabled: true
    cli_path: ~/.hermes/cli
  openclaw:
    enabled: true
    gateway: ws://127.0.0.1:18790
    token: 1772ca43c48f4b2d9f2e8b7c6a1f0e9d3d34

logging:
  level: INFO
  file: ./logs/agent_mesh.log
  max_size: 10485760  # 10MB
  backup_count: 5

web:
  enabled: true
  host: 127.0.0.1
  port: 18801
