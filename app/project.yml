name: AgentMeshConsole
options:
  bundleIdPrefix: com.agentmesh
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES

targets:
  AgentMeshConsole:
    type: application
    platform: macOS
    sources:
      - path: AgentMeshConsole/Sources
        type: group
      - path: AgentMeshConsole/Resources
        type: group
    info:
      path: AgentMeshConsole/Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Copyright 2024. All rights reserved."
        LSApplicationCategoryType: "public.app-category.developer-tools"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentmesh.console
        PRODUCT_NAME: Agent Mesh Console
        INFOPLIST_FILE: AgentMeshConsole/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        CODE_SIGN_ENTITLEMENTS: AgentMeshConsole/Resources/AgentMeshConsole.entitlements
    entitlements:
      path: AgentMeshConsole/Resources/AgentMeshConsole.entitlements
      properties:
        com.apple.security.network.client: true
